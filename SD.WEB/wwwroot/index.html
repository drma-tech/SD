<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>

        <div class="loading-message">
            Loading the necessary components. Please wait...
        </div>
        <div class="loading-secondary">
            If loading fails, it's usually due to a slow connection or system/browser restrictions. Try reloading the page or opening the app.
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <button onclick="location.reload()">Reload</button>
        <span class="dismiss">🗙</span>
    </div>

    <noscript>
        <div style="background: #fff3cd; color: #856404; padding: 1em; border: 1px solid #ffeeba; text-align: center;">
            This site requires JavaScript to function properly. Please enable JavaScript in your browser.
        </div>
    </noscript>

    <div id="toast-stack"></div>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        if (typeof Promise.withResolvers !== "function") {
            Promise.withResolvers = function () {
                let resolve, reject;
                const promise = new Promise((res, rej) => {
                    resolve = res;
                    reject = rej;
                });
                return { promise, resolve, reject };
            };
        }
    </script>
    <script src="_content/Toolbelt.Blazor.PWA.Updater.Service/script.min.js"></script>

    <script src="https://js.stripe.com/clover/stripe.js"></script>
    <script type="module" src="js/payments.js"></script>

    <script src="_content/Microsoft.Authentication.WebAssembly.Msal/AuthenticationService.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js" autostart="false"></script>
    <script>
        try {
            Blazor.start({
                configureRuntime: runtime => runtime.withConfig({
                    loadAllSatelliteResources: window.location.hostname === "127.0.0.1"
                })
            })
        } catch {
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.textContent = "An error occurred while loading the platform. Please try reloading the page or opening the app again.";

            const stack = document.getElementById("toast-stack");
            stack.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 10000);
        }
    </script>

    <script type="module" src="js/init.js"></script>
</body>
</html>
